<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ditto | My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #050510; color: white; min-height: 100vh; min-height: 100dvh;
      padding-bottom: 80px;
    }

    .bg {
      position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.35), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(6, 182, 212, 0.25), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(16, 185, 129, 0.2), transparent 30%);
      filter: blur(80px); animation: bgMove 10s infinite alternate ease-in-out;
    }
    @keyframes bgMove { 100% { transform: scale(1.08); } }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 64px; background: rgba(5, 5, 16, 0.85);
      backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-around; align-items: center;
      z-index: 1000; padding: 0 10px;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; color: #64748b; text-decoration: none;
      font-size: 11px; font-weight: 500; transition: all 0.3s ease;
      cursor: pointer; padding: 6px 16px; border-radius: 12px;
    }
    .nav-item .icon { font-size: 20px; }
    .nav-item:hover, .nav-item.active { color: #a78bfa; }
    .nav-item.active { background: rgba(139, 92, 246, 0.08); }

    .profile-header {
      padding: 30px 6% 20px; text-align: center;
    }
    .profile-avatar {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(6,182,212,0.2));
      border: 2px solid rgba(139, 92, 246, 0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 50px; margin: 0 auto 16px;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.15);
    }
    .profile-name {
      font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700;
      margin-bottom: 4px;
    }
    .profile-dittoid {
      font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700;
      background: linear-gradient(90deg, #8b5cf6, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }
    .profile-bio {
      color: #94a3b8; font-size: 14px; max-width: 320px; margin: 0 auto 20px;
      line-height: 1.5;
    }

    .stats-row {
      display: flex; justify-content: center; gap: 24px; margin-bottom: 24px;
    }
    .stat-item { text-align: center; }
    .stat-value {
      font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; color: white;
    }
    .stat-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }

    .section-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 20px; padding: 20px 24px;
      margin: 0 6% 16px; max-width: 500px; margin-left: auto; margin-right: auto;
    }
    .section-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600;
      color: #a78bfa; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .trait-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .trait-row:last-child { border-bottom: none; }
    .trait-label { font-size: 14px; color: #94a3b8; }
    .trait-value { font-size: 14px; font-weight: 600; color: white; }

    .mood-tags {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .mood-tag {
      padding: 6px 14px; border-radius: 20px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-size: 13px; color: #c4b5fd;
    }

    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(139, 92, 246, 0.95); backdrop-filter: blur(20px);
      color: white; padding: 14px 28px; border-radius: 16px;
      font-size: 14px; font-weight: 500; z-index: 1000;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 40px rgba(139, 92, 246, 0.4);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      font-family: 'Inter', sans-serif; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: rgba(239, 68, 68, 0.95); }

    .loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 60vh; color: #64748b; font-size: 15px;
    }

    @media(max-width: 480px) {
      .profile-avatar { width: 80px; height: 80px; font-size: 40px; }
      .profile-name { font-size: 20px; }
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <div id="loadingState" class="loading">Loading your profile...</div>

  <div id="profileContent" style="display:none;">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">&#129504;</div>
      <div class="profile-name" id="profileName">User</div>
      <div class="profile-dittoid" id="profileDittoid">d/---</div>
      <div class="profile-bio" id="profileBio">...</div>

      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-value" id="statDittos">0</div>
          <div class="stat-label">Dittos</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statDitts">0</div>
          <div class="stat-label">Ditts</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statMatches">0</div>
          <div class="stat-label">Matches</div>
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-title">Your Personality</div>
      <div class="trait-row"><span class="trait-label">Energy Style</span><span class="trait-value" id="traitEnergy">-</span></div>
      <div class="trait-row"><span class="trait-label">Heart Style</span><span class="trait-value" id="traitHeart">-</span></div>
      <div class="trait-row"><span class="trait-label">Core Drive</span><span class="trait-value" id="traitDrive">-</span></div>
      <div class="trait-row"><span class="trait-label">Conflict Style</span><span class="trait-value" id="traitConflict">-</span></div>
    </div>

    <div class="section-card">
      <div class="section-title">Current Mood</div>
      <div class="mood-tags" id="moodTags"></div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="ditts.html" class="nav-item"><span class="icon">&#128172;</span>Ditts</a>
    <a href="dittos.html" class="nav-item"><span class="icon">&#129309;</span>Dittos</a>
    <a href="profile.html" class="nav-item active"><span class="icon">&#128100;</span>Profile</a>
  </nav>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCRU2XnvDbSMKlOqAMijcUGYPC4RKg9nPM",
      authDomain: "dittoweb.firebaseapp.com",
      projectId: "dittoweb",
      storageBucket: "dittoweb.firebasestorage.app",
      messagingSenderId: "902164300349",
      appId: "1:902164300349:web:307e58ba6e3e9dbc33a054",
      measurementId: "G-JP34BSJ3RB"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const avatars = { '1': '&#129504;', '2': '&#10084;&#65039;', '3': '&#128064;', '4': '&#128170;', '5': '&#128066;', '6': '&#128099;' };

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }

      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (!userDoc.exists() || !userDoc.data().profileComplete) {
        window.location.href = 'quiz.html';
        return;
      }

      const data = userDoc.data();
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('profileContent').style.display = 'block';

      document.getElementById('profileName').textContent = data.displayName || 'Ditto User';
      document.getElementById('profileDittoid').textContent = data.dittoidCode || 'd/---';
      document.getElementById('profileBio').textContent = data.bio || '';
      document.getElementById('profileAvatar').innerHTML = avatars[data.avatar] || '&#129504;';

      document.getElementById('traitEnergy').textContent = capitalize(data.dittoid?.energy || '-');
      document.getElementById('traitHeart').textContent = capitalize(data.dittoid?.heart || '-');
      document.getElementById('traitDrive').textContent = capitalize(data.dittoid?.drive || '-');
      document.getElementById('traitConflict').textContent = data.conflictStyle || '-';

      const moodContainer = document.getElementById('moodTags');
      if (data.moodTags && data.moodTags.length > 0) {
        moodContainer.innerHTML = data.moodTags.map(m => `<span class="mood-tag">${m}</span>`).join('');
      } else {
        moodContainer.innerHTML = '<span style="color:#64748b;font-size:13px;">No mood selected</span>';
      }

      // Stats (placeholder - will be populated from other collections)
      document.getElementById('statDittos').textContent = data.dittosCount || 0;
      document.getElementById('statDitts').textContent = data.dittsCount || 0;
      document.getElementById('statMatches').textContent = data.matchesCount || 0;
    });

    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : '-'; }
  </script>
</body>
</html>
